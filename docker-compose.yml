version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusmsp
      POSTGRES_USER: nexusmsp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusmsp_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    # Don't expose DB to the internet in production
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusmsp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Don't expose Redis to the internet in production
    # ports:
    #   - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexusmsp:${POSTGRES_PASSWORD:-nexusmsp_secret}@postgres:5432/nexusmsp
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-please}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-reports@nexusmsp.local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      NODE_ENV: production
      PORT: 3000
    # Only expose internally — nginx proxies /api to this
    expose:
      - "3000"
    volumes:
      - reports:/app/reports-output

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata:
  reports:
